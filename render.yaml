services:
  - type: web
    name: ltvf-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_MOCK_SCHEDULED
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "https://ltvf-dashboard.vercel.app"
